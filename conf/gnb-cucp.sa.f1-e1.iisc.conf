Active_gNBs = ( "IISC");
# Asn1_verbosity, choice in: none, info, annoying
Asn1_verbosity = "none";
Num_Threads_PUSCH = 8;
sa = 1;

gNBs =
(
 {
    ////////// Identification parameters:
    gNB_ID = 0xe06;

    gNB_name  =  "IISC";

    // Tracking area code, 0x0000 and 0xfffe are reserved values
    tracking_area_code  = 1;
    plmn_list = ({ mcc = 001; 
                    mnc = 01; 
                    mnc_length = 2; 
                    snssaiList = ({ sst = 1; sd = 0xFFFFFF;}, { sst = 2; sd = 0x010203; }, { sst = 3; sd = 0x000231; }); 
                  }); # PLMN identity used to connect with the CORE.


    nr_cellid = 12341234L; #12345678L;

    tr_s_preference = "f1";

    local_s_if_name = "lo";
    local_s_address = "127.0.0.4"; # IPv4 address of CU-CP.
    remote_s_address = "127.0.0.3"; # IPv4 address of DU, 0.0.0.0 incase of multiple DUs.
    local_s_portc   = 501;
    local_s_portd   = 2153;
    remote_s_portc  = 500;
    remote_s_portd  = 2153;

    # ------- SCTP definitions
    SCTP :
    {
        # Number of streams to use in input/output
        SCTP_INSTREAMS  = 2;
        SCTP_OUTSTREAMS = 2;
    };


    ////////// AMF parameters:
    amf_ip_address      = ( { ipv4       = "192.168.70.132"; # AMF Network Functions IP addresss
                              ipv6       = "192:168:30::17";
                              active     = "yes";
                              preference = "ipv4";
                            }
                          );

    E1_INTERFACE =
    (
      {
        type = "cp";
        ipv4_cucp = "127.0.0.4"; # IPv4 Address of CU-CP E1 interface.
        port_cucp = 38462;
        ipv4_cuup = "127.0.0.5"; # Address of CU-UP, 0.0.0.0 incase of multiple CU-UPs. 
        port_cuup = 38462;
      }
    )

    NETWORK_INTERFACES :
    {
        GNB_INTERFACE_NAME_FOR_NG_AMF            = "eno1"; # Network interface name used to connect with AMF.
        GNB_IPV4_ADDRESS_FOR_NG_AMF              = "172.16.124.40"; # Address of the Network interface used to connect with the AMF.
    };
  }
);

security = {
  # preferred ciphering algorithms
  # the first one of the list that an UE supports in chosen
  # valid values: nea0, nea1, nea2, nea3
  ciphering_algorithms = ( "nea0" );

  # preferred integrity algorithms
  # the first one of the list that an UE supports in chosen
  # valid values: nia0, nia1, nia2, nia3
  integrity_algorithms = ( "nia2", "nia0" );

  # setting 'drb_ciphering' to "no" disables ciphering for DRBs, no matter
  # what 'ciphering_algorithms' configures; same thing for 'drb_integrity'
  drb_ciphering = "yes";
  drb_integrity = "no";
};
     
log_config :
{
  global_log_level                      ="info";
  hw_log_level                          ="info";
  phy_log_level                         ="info";
  mac_log_level                         ="info";
  rlc_log_level                         ="debug";
  pdcp_log_level                        ="info";
  rrc_log_level                         ="info";
  f1ap_log_level                        ="info";
  ngap_log_level                        ="debug";
};

