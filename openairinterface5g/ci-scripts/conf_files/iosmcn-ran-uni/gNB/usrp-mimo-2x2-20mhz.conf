### This is gNodeB configuration file for USRP
### This is MIMO conf file.
### 1. slicing for Open5GS should be commented for IOS-MCN core. 
### 2. Verify AMF IP of IOSMCN/ Open5GS/ Abot core. 
### 3. For Latency test set: ulsch_max_frame_inactivity = 0
### 4. For all other tests including multi-UE and throughput tests, set: ulsch_max_frame_inactivity = 10
### 5. Verify TDD pattern: 3614 (DDDSU) or 7624 (DDDDDDDSUU).
### 5a. For DDDSU set: dl_UL_TransmissionPeriodicity = 5 (i.e. 2.5ms)
### 5b. For DDDDDDDSUU set: dl_UL_TransmissionPeriodicity = 6 (i.e. 5 ms) 
### 6. For stability tests ensure that --pdcp_drop 1 is present in conf file.
### 7. Verify system in network interfaces 
### 8. For stability tests, recommended to set:
### 8a. pusch_RSSI_Threshold = -350
### 8b. pucch_RSSI_Threshold = -450
### 9. um_on_default_drb = 1 for Unacknowledged Mode and um_on_default_drb = 0 for Acknowledged Mode
#
### For Open5GS:
### 1. Un-comment the Open5GS slices. 
### 2. Change the AMF to Open5GS AMF ip address
#
### For Abot:
### 1. comment the Open5GS slices
### 2. Set the AMF to Abot AMF

Active_gNBs = ( "gNB-OAI");
# Asn1_verbosity, choice in: none, info, annoying
Asn1_verbosity = "none";
use-qos-scheduler = 0;
sa = 1;
usrp-tx-thread-config = 1;
pdcp-drop = 1;
continuous-tx = 1;

