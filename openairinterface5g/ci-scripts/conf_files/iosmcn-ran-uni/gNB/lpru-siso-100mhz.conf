### This is gNodeB configuration file for VVDN LPRU
### Pre-requisite: RU should be configured to 1x1. This is SISO conf file.
### 1. slicing for Open5GS should be commented for IOS-MCN core. 
### 2. MTU value should be 8870. Same as that set in the script vf.sh. Can be verified using 'ip link show'.
### 3. Verify AMF IP of IOSMCN/ Open5GS/ Abot core. 
### 4. For Latency test set: ulsch_max_frame_inactivity = 0
### 5. For all other tests including multi-UE and throughput tests, set: ulsch_max_frame_inactivity = 10
### 6. Verify TDD pattern: 3614 (DDDSU) or 7624 (DDDDDDDSUU).
### 6a. For DDDSU set: dl_UL_TransmissionPeriodicity = 5 (i.e. 2.5ms)
### 6b. For DDDDDDDSUU set: dl_UL_TransmissionPeriodicity = 6 (i.e. 5 ms) 
### 7. For stability tests ensure that --pdcp_drop 1 is present in conf file.
### 8. If VVDN LPRU is changed, 
### 8a. correct the ru_addr, absoluteFrequencySSB, dl_absoluteFrequencyPointA  (absoluteFrequencySSB and dl_absoluteFrequencyPointA are same for RU 75 and 77) 
### 9. Verify system in network interfaces 
### 10. For stability tests, recommended to set:
### 10a. pusch_RSSI_Threshold = -350
### 10b. pucch_RSSI_Threshold = -450
### 11. For N2HO testing ensure neighbour configuration matches the neighbour gNB configuration (nr_cellid, physical_cellid and gNB_ID)
### 12. Set hysteresis = 2, and offset = 2 for ping-pong handover.
### 13. To deactivate inactivity timer, set inactivity_timer_threshold to 0.
### 14. um_on_default_drb = 1 for Unacknowledged Mode and um_on_default_drb = 0 for Acknowledged Mode
#
### For Open5GS:
### 1. Un-comment the Open5GS slices. 
### 2. Change the AMF to Open5GS AMF ip address
#
### For Abot:
### 1. comment the Open5GS slices
### 2. Set the AMF to Abot AMF

