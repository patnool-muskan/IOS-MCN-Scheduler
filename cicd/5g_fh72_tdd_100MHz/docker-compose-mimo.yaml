services:
    ios-mcn-cucp:
        image: ghcr.io/${REPOSITORY}/ios-mcn-gnb-dis:${VERSION}
        container_name: gnb-cucp
        environment:
          USE_ADDITIONAL_OPTIONS: --telnetsrv --telnetsrv.shrmod o1 --telnetsrv.listenport 9091
        network_mode: host
        cpuset: 13,15
        volumes:
          - ../../conf/gnb-cucp.sa.f1-e1.iisc.conf:/opt/oai-gnb/etc/gnb.conf
        healthcheck:
            test: /bin/bash -c "pgrep nr-softmodem"
            interval: 10s
            timeout: 5s
            retries: 5
    ios-mcn-cuup:
        image: ghcr.io/${REPOSITORY}/ios-mcn-cuup-dis:${VERSION}
        container_name: gnb-cuup
        environment:
          USE_ADDITIONAL_OPTIONS: --telnetsrv --telnetsrv.shrmod o1 --telnetsrv.listenport 9092
        network_mode: host
        cpuset: 7,9
        volumes:
          - ../../conf/gnb-cuup.sa.f1-e1.iisc.conf:/opt/oai-gnb/etc/gnb.conf
        depends_on:
          - ios-mcn-cucp 
        healthcheck:
            test: /bin/bash -c "pgrep nr-cuup"
            interval: 10s
            timeout: 5s
            retries: 5
    ios-mcn-du:
        image: ghcr.io/${REPOSITORY}/ios-mcn-gnb-dis:${VERSION}
        privileged: true
        container_name: gnb-du
        environment:
          USE_ADDITIONAL_OPTIONS: --thread-pool 14 --rfsim --telnetsrv --telnetsrv.shrmod o1 --telnetsrv.listenport 9093
        network_mode: host
        cpuset: 2,4,6,8,10,12,14
        volumes:
          - /sys/bus/pci/drivers:/sys/bus/pci/drivers 
          - /sys/kernel/mm/hugepages:/sys/kernel/mm/hugepages
          - /sys/devices/system/node:/sys/devices/system/node
          - /dev:/dev
          - ../../conf/gnb-du.sa.band78.273PRB.2x2-f1-e1-vvdn_gen3.iisc.conf:/opt/oai-gnb/etc/gnb.conf
        depends_on:
          - ios-mcn-cucp
          - ios-mcn-cuup 
        healthcheck:
            test: /bin/bash -c "pgrep nr-nrsoftmodem"
            interval: 10s
            timeout: 5s
            retries: 5
