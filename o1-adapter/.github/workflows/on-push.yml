name: o1-adapter

on: 
  push:
    tags:
      - 'v*'  # Triggers only on tags starting with 'v' like v1.0, v2.1.3 etc.

jobs:
  authcheck:
      runs-on: ubuntu-latest
      env:
        REGISTRY: ghcr.io
        DOCKER_REGISTRY: ghcr.io/
        DOCKER_REPOSITORY: ${{ github.repository_owner }}/
      steps:
      - uses: actions/checkout@v3

 

      - name: Login to ghcr Hub 
        uses: docker/login-action@v3.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCRUSER }}
          password: ${{ secrets.GHCRPASS }}

  o1-adapter-build: 
    runs-on: ubuntu-latest 
    needs: authcheck
    permissions:
      contents: read
    env:
        REGISTRY: ghcr.io
        DOCKER_REGISTRY: ghcr.io/
        DOCKER_REPOSITORY: ${{ github.repository_owner }}/
    steps: 
    - uses: actions/checkout@v3
    - name: Extract tag name
      run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
    - name: Login to ghcr Hub 
      uses: docker/login-action@v3.1.0
      with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCRUSER }}
          password: ${{ secrets.GHCRPASS }}

    - name: Build and push "docker/Dockerfile.adapter" Docker image

      run: |
            docker build $NO_CACHE --target adapter-gnb --tag ghcr.io/${{ github.repository_owner }}/adapter-gnb:${{ env.TAG_NAME }} --file docker/Dockerfile.adapter .
            docker push ghcr.io/${{ github.repository_owner }}/adapter-gnb:${{ env.TAG_NAME }}
